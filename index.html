<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2>MyWeb</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#features">Features</a></li>
        </ul>
    </nav>

    <header>
        <h1>Welcome to My Interactive Site</h1>
        <p>Responsive design built with HTML & CSS.</p>
        <button onclick="changeColor()">Click to Interact</button>
    </header>

    <section id="features" class="grid">
        <div class="card"><h3>Responsive</h3><p>Works on all screens.</p></div>
        <div class="card"><h3>Fast</h3><p>Optimized for speed.</p></div>
        <div class="card"><h3>Free</h3><p>Hosted on GitHub Pages.</p></div>
    </section>

    <script>
        function changeColor() {
            const colors = ['#f4f4f4', '#e1f5fe', '#fff9c4', '#f1f8e9'];
            document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            alert("Background changed! That's JavaScript interactivity.");
        }
    </script>
</body>
</html>
